<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAB Brainrot Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
/* Base styles */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #111;
    color: #fff;
}

/* Header */
header {
    text-align: center;
    padding: 35px 20px;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 1px;
    background: #000;
    box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
}

/* Section titles */
.section {
    font-size: 22px;
    margin: 20px;
    padding-left: 10px;
    border-left: 4px solid #fff;
}

/* Shop grid */
.shop {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 0 20px 30px 20px;
}

/* Card */
.card {
    background: #000;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(255, 255, 255, 0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
}

/* Card images */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    filter: grayscale(100%) brightness(90%);
    transition: 0.3s;
}

.card img:hover {
    filter: grayscale(0%) brightness(100%);
}

/* Card content */
.card-content {
    padding: 12px;
    text-align: center;
}

.price {
    color: #fff;
    font-weight: 600;
    margin: 6px 0;
    font-size: 18px;
}

/* Buy button */
button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    background: #fff;
    color: #000;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #e5e5e5;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.modal-box {
    background: #111;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    border-radius: 8px;
    border: none;
}

.error {
    color: #f87171;
    font-size: 13px;
    margin-top: 5px;
}
</style>
</head>

<body>

<header>SAB Brainrot Marketplace</header>

<div class="section">🎄 2025 Christmas Brainrots</div>
<div class="shop">
  <!-- Example brainrot cards, replace URLs with real 2025 images -->
  <div class="card">
    <img src="https://i.ibb.co/6WZ6PjC/brainrot1.png" alt="Brainrot 1">
    <div class="card-content">
      <h3>Brainrot 1</h3>
      <div class="price">$20</div>
      <button onclick="buy('Brainrot 1')">Buy</button>
    </div>
  </div>

  <div class="card">
    <img src="https://i.ibb.co/Z6Jh0zR/brainrot2.png" alt="Brainrot 2">
    <div class="card-content">
      <h3>Brainrot 2</h3>
      <div class="price">$18</div>
      <button onclick="buy('Brainrot 2')">Buy</button>
    </div>
  </div>

  <div class="card">
    <img src="https://i.ibb.co/dLw7xg2/brainrot3.png" alt="Brainrot 3">
    <div class="card-content">
      <h3>Brainrot 3</h3>
      <div class="price">$22</div>
      <button onclick="buy('Brainrot 3')">Buy</button>
    </div>
  </div>

  <!-- Add as many brainrot cards as you need -->
</div>

<div class="modal" id="modal">
<div class="modal-box">
<h3>Enter Roblox Username</h3>
<input id="username" placeholder="Roblox username">
<div class="error" id="error"></div>
<button onclick="submitOrder()">Submit Order</button>
</div>
</div>

<script>
let selectedItem = ""

function buy(item){
  selectedItem = item
  document.getElementById("modal").style.display = "flex"
}

function submitOrder(){
  let username = document.getElementById("username").value.trim()
  if(username === ""){
    document.getElementById("error").innerText = "Please enter your Roblox username"
    return
  }

  fetch("https://discord.com/api/webhooks/1483533004008587316/KJNGPHYnd_wu5jkdVuBqZUYG64oDxrW3ysHuC7Dm63l8dyGvveAEi84_6g_WyKfCLEnr",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      content: "🧠 NEW BRAINROT ORDER\n\nItem: " + selectedItem + "\nRoblox Username: " + username
    })
  })

  alert("Order sent! Check Discord for confirmation.")
  document.getElementById("modal").style.display = "none"
}
</script>

</body>
</html>
