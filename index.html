<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SAB Brainrot Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

header{
text-align:center;
padding:40px;
font-size:38px;
font-weight:700;
}

.shop{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
padding:30px;
}

.card{
background:#1e293b;
border-radius:15px;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
transition:.2s;
}

.card:hover{
transform:scale(1.05);
}

.price{
color:#38bdf8;
font-size:20px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#38bdf8;
color:black;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#7dd3fc;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center;
}

.modal-content{
background:#1e293b;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}
</style>
</head>

<body>

<header>SAB Brainrot Marketplace</header>

<div class="shop">

<div class="card">
<h2>Classic Brainrot</h2>
<p>Original SAB brainrot</p>
<div class="price">$5</div>
<button onclick="buy('Classic Brainrot')">Buy</button>
</div>

<div class="card">
<h2>Golden Brainrot</h2>
<p>Rare glowing brainrot</p>
<div class="price">$10</div>
<button onclick="buy('Golden Brainrot')">Buy</button>
</div>

<div class="card">
<h2>Shadow Brainrot</h2>
<p>Dark edition brainrot</p>
<div class="price">$15</div>
<button onclick="buy('Shadow Brainrot')">Buy</button>
</div>

<div class="card">
<h2>Rainbow Brainrot</h2>
<p>Ultra rare rainbow brainrot</p>
<div class="price">$25</div>
<button onclick="buy('Rainbow Brainrot')">Buy</button>
</div>

</div>


<div class="modal" id="modal">
<div class="modal-content">

<h3>Enter Roblox Username</h3>

<input id="username" placeholder="Roblox Username">

<button onclick="submitOrder()">Submit</button>

</div>
</div>


<script>

let selectedItem = ""

function buy(item){
selectedItem=item
document.getElementById("modal").style.display="flex"
}

function submitOrder(){

let username=document.getElementById("username").value

fetch("https://discord.com/api/webhooks/1483533004008587316/KJNGPHYnd_wu5jkdVuBqZUYG64oDxrW3ysHuC7Dm63l8dyGvveAEi84_6g_WyKfCLEnr", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:"🧠 **NEW SAB ORDER**\n\nItem: "+selectedItem+"\nRoblox Username: "+username
})
})

alert("Order sent!")

document.getElementById("modal").style.display="none"

}

</script>

</body>
</html>
